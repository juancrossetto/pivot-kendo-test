			var processedData = {};

			// Robust function to handle PivotGrid totals based on configuration
			const handlePivotGridTotalsRobust = (pivotGrid, shouldHide) => {
				if (!pivotGrid || !pivotGrid.element) return;
				
				console.log(`🔍 Robust handling of PivotGrid totals (${shouldHide ? 'hide' : 'show'})...`);
				
				// Get PivotGrid configuration
				const dataSource = pivotGrid.dataSource;
				const measures = dataSource.measures();
				const columns = dataSource.columns();
				const rows = dataSource.rows();
				
				console.log(`📊 PivotGrid config - Measures: ${measures.length}, Columns: ${columns.length}, Rows: ${rows.length}`);
				
				// Method 1: Handle elements with k-alt and k-pivotgrid-total classes
				const totalElements = pivotGrid.element.find('th.k-alt, th.k-pivotgrid-total, td.k-alt, td.k-pivotgrid-total');
				console.log(`🔍 Found ${totalElements.length} total elements with k-alt/k-pivotgrid-total classes`);
				
				totalElements.each(function() {
					const element = $(this);
					const text = element.text().trim();
					const tagName = element.prop('tagName').toLowerCase();
					
					if (shouldHide) {
						element.hide();
						console.log(`🔍 Hidden ${tagName} with text: "${text}"`);
					} else {
						element.show();
						console.log(`🔍 Shown ${tagName} with text: "${text}"`);
					}
				});
				
				// Method 2: Handle footer
				const footer = pivotGrid.element.find('.k-grid-footer');
				if (footer.length > 0) {
					if (shouldHide) {
						footer.hide();
						console.log(`🔍 Hidden footer`);
					} else {
						footer.show();
						console.log(`🔍 Shown footer`);
					}
				}
				
				// Method 3: Handle last column (Grand Total column)
				const tables = pivotGrid.element.find('table');
				tables.each(function(tableIndex) {
					const table = $(this);
					const colgroup = table.find('colgroup');
					
					if (colgroup.length > 0) {
						const cols = colgroup.find('col');
						const lastColIndex = cols.length - 1;
						
						if (lastColIndex >= 0) {
							const lastCol = cols.eq(lastColIndex);
							
							if (shouldHide) {
								lastCol.css({width: 0});
								console.log(`🔍 Hidden last col at index ${lastColIndex} in table ${tableIndex + 1}`);
							} else {
								lastCol.css({width: ''});
								console.log(`🔍 Shown last col at index ${lastColIndex} in table ${tableIndex + 1}`);
							}
						}
						
						// Handle last cells in each row
						table.find('tr').each(function(rowIndex) {
							const row = $(this);
							const cells = row.find('td, th');
							const lastCellIndex = cells.length - 1;
							
							if (lastCellIndex >= 0) {
								const lastCell = cells.eq(lastCellIndex);
								
								if (shouldHide) {
									lastCell.hide();
									console.log(`🔍 Hidden last cell at index ${lastCellIndex} in row ${rowIndex + 1} of table ${tableIndex + 1}`);
								} else {
									lastCell.show();
									console.log(`🔍 Shown last cell at index ${lastCellIndex} in row ${rowIndex + 1} of table ${tableIndex + 1}`);
								}
							}
						});
					}
				});
				
				// Method 4: Handle row totals (last row if exists)
				const lastRow = pivotGrid.element.find('tr:last-child');
				if (lastRow.length > 0) {
					const lastRowCells = lastRow.find('td, th');
					
					// Check if this looks like a totals row (all cells have k-alt class or contain totals)
					let isTotalsRow = false;
					lastRowCells.each(function() {
						const cell = $(this);
						const text = cell.text().trim().toLowerCase();
						if (cell.hasClass('k-alt') || cell.hasClass('k-pivotgrid-total') || 
							text.includes('total') || text.includes('sum') || text.includes('grand')) {
							isTotalsRow = true;
							return false; // break the loop
						}
					});
					
					if (isTotalsRow) {
						if (shouldHide) {
							lastRow.hide();
							console.log(`🔍 Hidden totals row`);
						} else {
							lastRow.show();
							console.log(`🔍 Shown totals row`);
						}
					}
				}
				
				console.log(`✅ Robust totals handling completed (${shouldHide ? 'hidden' : 'shown'})`);
			};

			// Function to handle totals visibility
			const handleTotalsVisibility = (pivotGrid) => {
				if (!pivotGrid) return;
				
				console.log("🔍 Global switch state:", hideTotalsSwitchState);
				
				if (hideTotalsSwitchState) {
					console.log("🔍 Hiding totals", pivotGrid);
					
					// Use robust approach

					console.log("✅ Totales ocultos desde handleTotalsVisibility");
				} else {
					console.log("🔍 Showing totals");
					
					// Method 2: Show all td elements with k-alt class (total cells)
					table.find('td.k-alt, td.k-pivotgrid-total').each(function() {

					}
				};
				
				console.log("✅ Total columns shown");
			};

				let processedCount = 0;

					}

					// If row and column match, SUM the measure value
					if (rowMatch && columnMatch) {
						const itemValue = parseFloat(item[measureName]) || 0;
						totalValue += itemValue;
						matchCount++;
					}
				}

				// Log for debugging if needed
				if (matchCount > 0) {
					console.log(
						`✅ Found ${matchCount} matches for category: ${category}, total: ${totalValue}`
					);
				}

				return totalValue;
			};

			// Helper function to detect if a value is a date
			const isDateField = (value) => {
				if (!value) return false;
				// Check if it's an ISO date or similar
				return (
					typeof value === "string" &&
					(value.includes("T") || value.includes("-") || value.includes("/")) &&
					!isNaN(new Date(value).getTime())
				);
			};

			// Function to format date to MM/DD/YYYY format
			const formatDateToMMDDYYYY = (dateValue) => {
				try {
					const date = new Date(dateValue);
					const month = String(date.getMonth() + 1).padStart(2, "0");
					const day = String(date.getDate()).padStart(2, "0");
					const year = date.getFullYear();
					return `${month}/${day}/${year}`;
				} catch (e) {
					console.warn("⚠️ Error formatting date:", dateValue, e);
					return dateValue;
				}
			};

			// Function to format column values
			const formatColumnValue = (value) => {
				if (value && value.includes("-") && value.includes("T")) {
					return formatDateToMMDDYYYY(value);
				}
				return value;
			};
		</script>
	</body>
</html>
